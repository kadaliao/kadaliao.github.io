baseURL = "https://kadaliao.github.io/"
languageCode = "zh-CN"
title = "Kada's Notes"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[params]
  author = "Kada Liao"
  description = "Python 工程师，专注 AI 应用工程"
  defaultTheme = "auto"
  showReadingTime = true
  showShareButtons = false
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true
  showToc = true
  tocOpen = false
  dateFormat = "2006-01-02"

  [params.homeInfoParams]
    Title = "Kada's Notes"
    Content = "Python 工程师，写 AI Agent、RAG、LLM 应用工程实践，偶尔聊聊 Python 那些事。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/kadaliao"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 30

[markup]
  [markup.highlight]
    noClasses = false
    style = "github-dark"
  [markup.goldmark.renderer]
    unsafe = true
